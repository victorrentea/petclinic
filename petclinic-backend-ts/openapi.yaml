components:
  schemas:
    OwnerDto:
      properties:
        address:
          description: The postal address of the pet owner.
          example: 110 W. Liberty St.
          type: string
        city:
          description: The city of the pet owner.
          example: Madison
          type: string
        firstName:
          description: The first name of the pet owner.
          example: George
          type: string
        id:
          description: The ID of the pet owner.
          example: 1
          readOnly: true
          type: number
        lastName:
          description: The last name of the pet owner.
          example: Franklin
          type: string
        pets:
          description: The pets owned by this individual including any booked vet visits.
          items:
            $ref: '#/components/schemas/PetDto'
          readOnly: true
          type: array
        telephone:
          description: The telephone number of the pet owner.
          example: '6085551023'
          type: string
      required:
        - firstName
        - lastName
        - address
        - city
        - telephone
        - pets
      type: object
    OwnerFieldsDto:
      properties:
        address:
          description: The postal address of the pet owner.
          example: 110 W. Liberty St.
          type: string
        city:
          description: The city of the pet owner.
          example: Madison
          type: string
        firstName:
          description: The first name of the pet owner.
          example: George
          type: string
        lastName:
          description: The last name of the pet owner.
          example: Franklin
          type: string
        telephone:
          description: The telephone number of the pet owner.
          example: '6085551023'
          type: string
      required:
        - firstName
        - lastName
        - address
        - city
        - telephone
      type: object
    PetDto:
      properties:
        birthDate:
          example: '2010-09-07'
          type: string
        id:
          description: The ID of the pet.
          example: 1
          readOnly: true
          type: number
        name:
          description: The name of the pet.
          example: Leo
          type: string
        ownerId:
          description: The ID of the pet's owner.
          example: 1
          readOnly: true
          type: number
        visits:
          description: Vet visit bookings for this pet.
          items:
            $ref: '#/components/schemas/VisitDto'
          readOnly: true
          type: array
      required:
        - name
        - birthDate
        - id
        - visits
      type: object
    PetFieldsDto:
      properties:
        birthDate:
          description: The date of birth of the pet.
          example: '2010-09-07'
          type: string
        name:
          description: The name of the pet.
          example: Leo
          type: string
        type:
          $ref: '#/components/schemas/PetTypeDto'
      required:
        - name
        - birthDate
        - type
      type: object
    PetTypeDto:
      properties:
        id:
          description: The ID of the pet type.
          example: 1
          type: number
        name:
          description: The name of the pet type.
          example: cat
          type: string
      required:
        - name
        - id
      type: object
    PetTypeFieldsDto:
      properties:
        name:
          description: The name of the pet type.
          example: cat
          type: string
      required:
        - name
      type: object
    RoleDto:
      properties:
        name:
          description: The role's name
          example: admin
          type: string
      required:
        - name
      type: object
    SpecialtyDto:
      properties:
        id:
          description: The ID of the specialty.
          example: 1
          readOnly: true
          type: number
        name:
          description: The name of the specialty.
          example: radiology
          type: string
      required:
        - id
        - name
      type: object
    UserDto:
      properties:
        enabled:
          description: Indicates if the user is enabled
          example: true
          type: boolean
        password:
          description: The password
          example: 1234abc
          type: string
        roles:
          description: The roles of an user
          items:
            $ref: '#/components/schemas/RoleDto'
          type: array
        username:
          description: The username
          example: john.doe
          type: string
      required:
        - username
        - roles
      type: object
    VetDto:
      properties:
        firstName:
          description: The first name of the vet.
          example: James
          type: string
        id:
          description: The ID of the vet.
          example: 1
          readOnly: true
          type: number
        lastName:
          description: The last name of the vet.
          example: Carter
          type: string
        specialties:
          description: The specialties of the vet.
          items:
            $ref: '#/components/schemas/SpecialtyDto'
          type: array
      required:
        - firstName
        - lastName
        - specialties
        - id
      type: object
    VisitDto:
      properties:
        date:
          description: The date of the visit.
          example: '2013-01-01'
          type: string
        description:
          description: The description for the visit.
          example: rabies shot
          type: string
        id:
          description: The ID of the visit.
          example: 1
          readOnly: true
          type: number
        ownerFirstName:
          description: First name of the owner (server-populated).
          readOnly: true
          type: string
        ownerId:
          description: ID of the owner of the pet (server-populated).
          readOnly: true
          type: number
        ownerLastName:
          description: Last name of the owner (server-populated).
          readOnly: true
          type: string
        petId:
          description: The ID of the pet.
          example: 1
          type: number
        petName:
          description: Name of the pet (server-populated).
          readOnly: true
          type: string
      required:
        - description
        - id
        - petId
      type: object
    VisitFieldsDto:
      properties:
        date:
          description: The date of the visit.
          example: '2013-01-01'
          type: string
        description:
          description: The description for the visit.
          example: rabies shot
          type: string
      required:
        - description
      type: object
  securitySchemes:
    basic:
      scheme: basic
      type: http
info:
  contact: {}
  description: This is the REST API documentation of the Petclinic backend. If authentication is enabled, use admin/admin when calling the APIs
  title: REST Petclinic Backend API
  version: '1.0'
openapi: 3.0.0
paths:
  /api/owners:
    get:
      operationId: listOwners
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/OwnerDto'
                type: array
          description: ''
      summary: List owners
      tags:
        - owner
    post:
      operationId: addOwner
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerFieldsDto'
        required: true
      responses:
        '201':
          description: ''
      summary: Create an owner
      tags:
        - owner
  /api/owners/count:
    get:
      operationId: countOwners
      parameters: []
      responses:
        '200':
          description: ''
      summary: Count owners
      tags:
        - owner
  /api/owners/{ownerId}:
    delete:
      operationId: deleteOwner
      parameters:
        - in: path
          name: ownerId
          required: true
          schema:
            type: number
      responses:
        '200':
          description: ''
      summary: Delete an owner by ID
      tags:
        - owner
    get:
      operationId: getOwner
      parameters:
        - in: path
          name: ownerId
          required: true
