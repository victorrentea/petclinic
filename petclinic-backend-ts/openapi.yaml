        required: true
      responses:
        '201':
          description: ''
      summary: Add a visit for an owner's pet
      tags:
        - owner
  /api/pets:
    get:
      operationId: PetController_listPets
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - pets
  /api/pets/{petId}:
