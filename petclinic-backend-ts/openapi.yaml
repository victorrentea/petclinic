            type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetDto'
          description: ''
      summary: Get a pet belonging to an owner
      tags:
        - owner
    put:
      operationId: updateOwnersPet
      parameters:
        - in: path
          name: ownerId
          required: true
          schema:
            type: number
        - in: path
          name: petId
          required: true
          schema:
            type: number
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetFieldsDto'
        required: true
      responses:
        '200':
          description: ''
      summary: Update an owner's pet
      tags:
        - owner
  /api/owners/{ownerId}/pets/{petId}/visits:
    post:
      operationId: addVisitToOwner
      parameters:
        - in: path
          name: ownerId
          required: true
          schema:
            type: number
        - in: path
          name: petId
          required: true
          schema:
            type: number
      requestBody:
        content:
