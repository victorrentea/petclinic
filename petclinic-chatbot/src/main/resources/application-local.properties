# =====================================================================================
# LOCAL workshop profile — run the chatbot WITHOUT OpenAI, fully on a local LLM (Ollama).
#
# Activate with:  -Dspring.profiles.active=local   (or SPRING_PROFILES_ACTIVE=local)
#
# One-time setup (Ollama must be installed and running on http://localhost:11434):
#   ollama pull qwen2.5            # chat model with solid tool/function calling (this app is tool-heavy via MCP)
#   ollama pull qwen2.5:0.5b       # tiny/fast model for the JudgeGuard safety classifier (judge LLM)
#   ollama pull nomic-embed-text   # embedding model for the RAG specialty knowledge
#
# Provider selection (Spring AI 1.1.x): both the OpenAI and Ollama starters are on the
# classpath, so we MUST tell Spring AI which provider to wire. The top-level selector
# properties below switch chat + embeddings to Ollama. In the DEFAULT profile these are
# unset, so they fall back to "openai" (the default) — OpenAI stays the default provider.
# Setting them to "ollama" here disables the OpenAI auto-configuration for chat/embedding,
# so exactly ONE ChatModel and ONE EmbeddingModel bean exist under this profile. No code
# changes needed: ChatClient.Builder, EmbeddingModel and SimpleVectorStore still come from
# Spring AI autoconfig — only the backing provider changes.
# =====================================================================================
spring.ai.model.chat=ollama
spring.ai.model.embedding=ollama

# --- Ollama connection ---
spring.ai.ollama.base-url=http://localhost:11434

# --- Chat model: qwen2.5 has strong tool/function-calling (needed for the MCP + local tools) ---
# Alternative with comparable tool-calling: llama3.1 — `ollama pull llama3.1`, then set the model below.
spring.ai.ollama.chat.options.model=qwen2.5

# --- Judge LLM: a SMALLER/faster local model than qwen2.5 for the JudgeGuard safety classifier ---
petclinic.chatbot.judge.model=qwen2.5:0.5b

# --- Embedding model for RAG over specialty-knowledge.md ---
spring.ai.ollama.embedding.options.model=nomic-embed-text

# Don't auto-pull models at startup; we expect the workshop machine to have run the two
# `ollama pull` commands above. (Flip to `when_missing` if you want Spring AI to pull them.)
spring.ai.ollama.init.pull-model-strategy=never
