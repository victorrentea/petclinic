version: '3.8'

services:
  backend:
    build:
      context: ../petclinic-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/owners"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - petclinic-ui-test

  frontend:
    build:
      context: ../petclinic-frontend
      dockerfile: Dockerfile
    ports:
      - "4200:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - petclinic-ui-test

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_dir: /work
    volumes:
      - ./:/work
      - ./test-results:/work/test-results
    environment:
      - BASE_URL=http://frontend:8080
      - API_BASE_URL=http://backend:8080/api
      - CI=true
    command: sh -c "npm install && npx playwright test"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - petclinic-ui-test

networks:
  petclinic-ui-test:
    driver: bridge
