server.port=8082
spring.ai.openai.api-key=${OPENAI_API_KEY}
# pgvector runs in THIS module's docker-compose on :5433 (embedded Zonky PG on :5432 lacks the vector extension)
spring.datasource.url=jdbc:postgresql://localhost:5433/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.table-name=vector_store
spring.jackson.deserialization.fail-on-unknown-properties=false
# Remote petclinic MCP server (the backend) + auth + elicitation demo values
petclinic.chatbot.mcp.url=http://localhost:8080
