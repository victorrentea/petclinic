server.port=8082
# Default = OpenAI. The Ollama starter is also on the classpath (for the `local` profile), and BOTH
# providers' auto-config use matchIfMissing=true — so we MUST pin the selectors explicitly here, or
# the default profile gets two ChatModel/EmbeddingModel beans. application-local.properties flips
# these to `ollama`.
spring.ai.model.chat=openai
spring.ai.model.embedding=openai
spring.ai.openai.api-key=${OPENAI_API_KEY}
# Pin a cheap, predictable model (~1-2 cents per CI build) instead of the Spring AI default.
spring.ai.openai.chat.options.model=gpt-4o-mini

# Vector store: in-memory SimpleVectorStore by default (see the @Bean in ChatbotApp) —
# NO Postgres/Docker needed to run the workshop.
# To switch to a real pgvector store instead:
#   1. add the spring-ai-starter-vector-store-pgvector dependency back to pom.xml
#   2. remove the SimpleVectorStore @Bean from ChatbotApp
#   3. run `docker compose up -d` in this module (pgvector on :5433)
#   4. uncomment the four properties below
#spring.datasource.url=jdbc:postgresql://localhost:5433/postgres
#spring.datasource.username=postgres
#spring.datasource.password=postgres
#spring.ai.vectorstore.pgvector.initialize-schema=true

spring.jackson.deserialization.fail-on-unknown-properties=false
# Remote petclinic MCP server (the backend) + auth
petclinic.chatbot.mcp.url=http://localhost:8080
