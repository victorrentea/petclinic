server.port=8082
# One virtual thread per request (Spring MVC) so the per-user token ThreadLocal reaches the MCP tool call.
spring.threads.virtual.enabled=true
# Default = OpenAI. The Ollama starter is also on the classpath (for the `local` profile), and BOTH
# providers' auto-config use matchIfMissing=true — so we MUST pin the selectors explicitly here, or
# the default profile gets two ChatModel/EmbeddingModel beans. application-local.properties flips
# these to `ollama`.
spring.ai.model.chat=openai
spring.ai.model.embedding=openai
spring.ai.openai.api-key=${OPENAI_API_KEY}
# Pin a cheap, predictable model (~1-2 cents per CI build) instead of the Spring AI default.
spring.ai.openai.chat.options.model=gpt-4o-mini
# Judge LLM — a SEPARATE, cheap classifier model (JudgeGuard), independent of the main chat model.
petclinic.chatbot.judge.model=gpt-4o-mini

# Vector store: in-memory SimpleVectorStore (see the @Bean in ChatbotApp) — NO Postgres/Docker.
# Its content is a projection of the backend specialties: RagIngestion POLLS GET /api/specialties/feed
# (ETag-guarded, so unchanged polls are a no-op 304) and embeds ONLY the symptom text. The backend
# knows nothing about the chatbot. Backend base URL the feed is polled from:
petclinic.chatbot.backend-url=http://localhost:8080
# How often the chatbot polls the backend specialty feed, in milliseconds.
petclinic.chatbot.poll-ms=3000
# Embeddings cached here (plus a <file>.meta.json sidecar) so a restart reloads them instead of
# re-embedding (and re-billing); an unchanged backend then yields a silent 304 on the first poll.
petclinic.chatbot.vectorstore-file=rag-vector-store.json

spring.jackson.deserialization.fail-on-unknown-properties=false
# Remote petclinic MCP server (the backend)
petclinic.chatbot.mcp.url=http://localhost:8080
# Static SERVICE key shared with the backend MCP and the Claude chatbot's .mcp.json — it authenticates
# THIS chatbot to the MCP server (on every request, incl. the startup handshake). The per-USER identity
# is NOT here: it's the browser's JWT, propagated per request (read from the SecurityContext). NOT a real secret.
petclinic.chatbot.mcp.api-key=pc-mcp-7f3a9c2e1b8d4056
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# --- Observability / metrics (Grafana via Prometheus) ---------------------------------------------
# Expose the Prometheus scrape endpoint (+ health/metrics browser). Spring AI auto-records, with no
# extra code, the GenAI metrics once a MeterRegistry is present:
#   gen_ai_client_token_usage_total{gen_ai_token_type=input|output, gen_ai_request_model, ...}  (tokens)
#   gen_ai_client_operation_seconds_{count,sum,max}                                             (latency)
# Our own TokenCostMeter adds the $ metric (tokens x price): gen_ai_client_cost_usd_total.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
# Latency histogram buckets so Grafana can draw heatmaps / percentiles for the model-call timer.
management.metrics.distribution.percentiles-histogram.gen_ai.client.operation=true
