<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <form class="form-horizontal" id="search-owner-form" (ngSubmit)="search()">
      <div class="form-group">
        <label class="col-sm-2 control-label" for="lastName">Last name</label>
        <div class="col-sm-10">
          <input class="form-control" size="30" maxlength="80"
                 id="lastName" name="lastName" [(ngModel)]="lastName"/>
        </div>
      </div>
      <div class="form-group">
        <div class="col-sm-offset-2 col-sm-10 owners-toolbar">
          <button type="button" class="btn btn-default" (click)="addOwner()">
            <span class="glyphicon glyphicon-plus" aria-hidden="true"></span> Add Owner</button>
          <button type="submit" class="btn btn-default">Find Owner</button>
        </div>
      </div>
    </form>

    <div class="table-responsive" id="ownersTable">
      <table mat-table [dataSource]="owners" matSort
             [matSortActive]="sortActive" [matSortDirection]="sortDirection"
             matSortDisableClear (matSortChange)="onSortChange($event)"
             class="owners-grid">

        <!-- Name: sortable, shown as "Last, First" -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let owner" class="ownerFullName">
            <a routerLink="/owners/{{ owner.id }}" routerLinkActive="active"
               (click)="onSelect(owner)">{{ owner.lastName }}, {{ owner.firstName }}</a>
          </td>
        </ng-container>

        <ng-container matColumnDef="address">
          <th mat-header-cell *matHeaderCellDef>Address</th>
          <td mat-cell *matCellDef="let owner">{{ owner.address }}</td>
        </ng-container>

        <!-- City: sortable -->
        <ng-container matColumnDef="city">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>City</th>
          <td mat-cell *matCellDef="let owner">{{ owner.city }}</td>
        </ng-container>

        <ng-container matColumnDef="telephone">
          <th mat-header-cell *matHeaderCellDef>Telephone</th>
          <td mat-cell *matCellDef="let owner">{{ owner.telephone }}</td>
        </ng-container>

        <ng-container matColumnDef="pets">
          <th mat-header-cell *matHeaderCellDef>Pets</th>
          <td mat-cell *matCellDef="let owner">{{ petNames(owner) }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div class="owners-empty" *ngIf="isOwnersDataReceived && owners.length === 0">
        No owners with last name starting with "{{ lastName }}".
      </div>

      <mat-paginator [length]="totalElements"
                     [pageIndex]="pageIndex"
                     [pageSize]="pageSize"
                     [pageSizeOptions]="pageSizeOptions"
                     (page)="onPage($event)">
      </mat-paginator>
    </div>
  </div>
</div>
