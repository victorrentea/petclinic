<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <div class="form-group">
      <label>Search </label>
      <input class="form-control" size="30"
             maxlength="80" id="search" name="search"
             [formControl]="searchControl"
             placeholder="Search by name, address, city, telephone or pet..."/>
    </div>

    <div *ngIf="isOwnersDataReceived && owners?.length === 0">
      No owners found for "{{searchControl.value}}"
    </div>
    <div class="table-responsive" id="ownersTable" *ngIf="owners?.length > 0">
      <table class="table table-striped">
        <thead>
        <tr>
          <th>Name</th>
          <th>Address</th>
          <th>City</th>
          <th>Telephone</th>
          <th>Pets</th>
        </tr>
        </thead>

        <tbody>
        <tr *ngFor="let owner of owners">
          <td class="ownerFullName"><a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
                                       (click)="onSelect(owner)">{{ owner.firstName }} {{ owner.lastName }}</a></td>
          <td>{{ owner.address }}</td>
          <td>{{ owner.city }}</td>
          <td>{{ owner.telephone }}</td>
          <td>
            <span *ngFor="let pet of owner.pets">{{ pet.name }} </span>
          </td>
        </tr>
        </tbody>
      </table>
      <div>
        <button *ngIf="isOwnersDataReceived" class="btn btn-default" (click)="addOwner()">Add Owner</button>
      </div>
    </div>
  </div>
</div>
