<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <form method="get"
          class="form-horizontal" id="search-owner-form">
      <div class="form-group">
        <div class="control-group" id="lastNameGroup">
          <label class="col-sm-2 control-label">Search </label>
          <div class="col-sm-10">
            <input class="form-control" size="30"
                   maxlength="80" id="lastName" name="lastName" [(ngModel)]="lastName"
                   (input)="onSearchInput()" (blur)="onSearchBlur()" value=""/> <span class="help-inline"></span>
          </div>
        </div>
      </div>
    </form>

    <!-- 9.1 Error banner -->
    <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
      {{ errorMessage }}
      <button class="btn btn-sm btn-default" (click)="retry()">Retry</button>
    </div>

    <!-- 9.2 No-results message -->
    <div *ngIf="owners?.length === 0 && lastName">No owners matching "{{lastName}}"</div>

    <div *ngIf="owners?.length > 0">
      <div class="table-responsive" id="ownersTable">
      <table class="table table-striped">
        <thead>
        <tr>
          <th>Name</th>
          <th>Address</th>
          <th>City</th>
          <th>Telephone</th>
          <th>Pets</th>
        </tr>
        </thead>

        <tbody>
        <tr *ngFor="let owner of owners">
          <td class="ownerFullName"><a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
                                       (click)="onSelect(owner)">{{ owner.firstName }} {{ owner.lastName }}</a></td>
          <td>{{ owner.address }}</td>
          <td>{{ owner.city }}</td>
          <td>{{ owner.telephone }}</td>
          <td>
            <div *ngFor="let pet of owner.pets" class="owner-pet">{{ pet.name }}</div>
          </td>
        </tr>
        </tbody>
      </table>
      </div>

      <!-- 9.3 Pagination control -->
      <app-pagination-control
        *ngIf="owners?.length > 0"
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        [pageSize]="pageSize"
        [loading]="loading"
        (pageChange)="onPageChange($event)"
        (pageSizeChange)="onPageSizeChange($event)">
      </app-pagination-control>

      <div>
        <button class="btn btn-default" (click)="addOwner()">Add Owner</button>
      </div>
    </div>
  </div>
</div>
