<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <div class="search-bar">
      <label class="control-label search-label">Last name</label>
      <input class="form-control search-input" maxlength="80"
             [(ngModel)]="lastName" (keyup.enter)="search()" />
      <button class="btn btn-default" type="button" (click)="search()">Find Owner</button>
      <button class="btn btn-default" type="button" (click)="addOwner()">Add Owner</button>
    </div>

    <div class="table-responsive">
      <table mat-table [dataSource]="owners" matSort
             [matSortActive]="sortActive" [matSortDirection]="sortDirection"
             (matSortChange)="onSort($event)"
             class="owners-table">

        <!-- Name Column (sortable) — rendered first-name-first, as the old grid -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let owner" class="ownerFullName">
            <a [routerLink]="['/owners', owner.id]" (click)="onSelect(owner)">
              {{owner.firstName}} {{owner.lastName}}
            </a>
          </td>
        </ng-container>

        <!-- Address Column (sortable) -->
        <ng-container matColumnDef="address">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Address</th>
          <td mat-cell *matCellDef="let owner">{{owner.address}}</td>
        </ng-container>

        <!-- City Column (sortable) -->
        <ng-container matColumnDef="city">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>City</th>
          <td mat-cell *matCellDef="let owner">{{owner.city}}</td>
        </ng-container>

        <!-- Telephone Column (sortable) -->
        <ng-container matColumnDef="telephone">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Telephone</th>
          <td mat-cell *matCellDef="let owner">{{owner.telephone}}</td>
        </ng-container>

        <!-- Pets Column (NO sort affordance) — one pet per line, as the old grid -->
        <ng-container matColumnDef="pets">
          <th mat-header-cell *matHeaderCellDef>Pets</th>
          <td mat-cell *matCellDef="let owner">
            <div *ngFor="let pet of owner.pets">{{pet.name}}</div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>

    <mat-paginator
      [length]="totalElements"
      [pageSize]="size"
      [pageSizeOptions]="[5, 10, 20]"
      [pageIndex]="page"
      (page)="onPage($event)">
    </mat-paginator>
  </div>
</div>
