<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <div class="owners-controls">
      <div id="nameGroup">
        <label class="owner-search-label" for="lastName">Last name</label>
        <input class="form-control owner-search-input" id="lastName" name="lastName"
               maxlength="80" [(ngModel)]="lastName" (keyup.enter)="search()"/>
        <button type="button" class="btn btn-default" (click)="search()">Find Owner</button>
      </div>
    </div>

    <div *ngIf="errorMessage" class="text-danger">{{ errorMessage }}</div>

    <table mat-table [dataSource]="owners" matSort
           [matSortActive]="sort" [matSortDirection]="dir" (matSortChange)="onSort($event)"
           id="ownersTable" class="owners-table">

      <!-- Name: sortable (last_name, first_name); displayed "Last, First" to match the sort order -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let owner" class="ownerFullName">
          <a routerLink="/owners/{{owner.id}}" (click)="onSelect(owner)">{{ owner.lastName }}, {{ owner.firstName }}</a>
        </td>
      </ng-container>

      <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef>Address</th>
        <td mat-cell *matCellDef="let owner">{{ owner.address }}</td>
      </ng-container>

      <!-- City: sortable (case-insensitive) -->
      <ng-container matColumnDef="city">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>City</th>
        <td mat-cell *matCellDef="let owner">{{ owner.city }}</td>
      </ng-container>

      <ng-container matColumnDef="telephone">
        <th mat-header-cell *matHeaderCellDef>Telephone</th>
        <td mat-cell *matCellDef="let owner">{{ owner.telephone }}</td>
      </ng-container>

      <ng-container matColumnDef="pets">
        <th mat-header-cell *matHeaderCellDef>Pets</th>
        <td mat-cell *matCellDef="let owner">
          <span *ngFor="let pet of owner.pets" class="owner-pet">{{ pet.name }}</span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="totalElements"
                   [pageIndex]="pageIndex"
                   [pageSize]="pageSize"
                   [pageSizeOptions]="pageSizeOptions"
                   (page)="onPage($event)"
                   showFirstLastButtons>
    </mat-paginator>

    <div>
      <button *ngIf="isOwnersDataReceived" class="btn btn-default" (click)="addOwner()">Add Owner</button>
    </div>
  </div>
</div>
