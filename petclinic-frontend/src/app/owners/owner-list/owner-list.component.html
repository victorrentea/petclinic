<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <form method="get"
          class="form-horizontal" id="search-owner-form">
      <div class="form-group">
        <div class="control-group" id="lastNameGroup">
          <label class="col-sm-2 control-label">Last name </label>
          <div class="col-sm-10">
            <input class="form-control" size="30"
                   maxlength="80" id="lastName" name="lastName" [(ngModel)]="lastName" value=""/> <span class="help-inline"></span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="col-sm-offset-2 col-sm-10">
          <button type="submit" class="btn btn-default" (click)="searchByLastName(lastName)">Find
            Owner</button>
        </div>
      </div>

    </form>

    <div *ngIf="isOwnersDataReceived && totalElements === 0">No owners with LastName starting with "{{lastName}}"</div>

    <div class="table-responsive" id="ownersTable" [hidden]="totalElements === 0">
      <table mat-table [dataSource]="owners" matSort (matSortChange)="onSortChange($event)"
             class="owners-table">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let owner" class="ownerFullName">
            <a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
               (click)="onSelect(owner)">{{ owner.lastName }}, {{ owner.firstName }}</a>
          </td>
        </ng-container>

        <ng-container matColumnDef="address">
          <th mat-header-cell *matHeaderCellDef>Address</th>
          <td mat-cell *matCellDef="let owner">{{ owner.address }}</td>
        </ng-container>

        <ng-container matColumnDef="city">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>City</th>
          <td mat-cell *matCellDef="let owner">{{ owner.city }}</td>
        </ng-container>

        <ng-container matColumnDef="telephone">
          <th mat-header-cell *matHeaderCellDef>Telephone</th>
          <td mat-cell *matCellDef="let owner">{{ owner.telephone }}</td>
        </ng-container>

        <ng-container matColumnDef="pets">
          <th mat-header-cell *matHeaderCellDef>Pets</th>
          <td mat-cell *matCellDef="let owner">{{ petNames(owner) }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [pageSizeOptions]="pageSizeOptions"
        (page)="onPageChange($event)">
      </mat-paginator>

      <div>
        <button *ngIf="isOwnersDataReceived" class="btn btn-default" (click)="addOwner()">Add Owner</button>
      </div>
    </div>
  </div>
</div>
