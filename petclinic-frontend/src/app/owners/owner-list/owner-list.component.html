<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <form method="get"
          class="form-horizontal" id="search-owner-form"
          (ngSubmit)="onSearch(lastName)">
      <div class="form-group">
        <div class="control-group" id="lastNameGroup">
          <label class="col-sm-2 control-label">Last name </label>
          <div class="col-sm-10">
            <input class="form-control" size="30"
                   maxlength="80" id="lastName" name="lastName" [(ngModel)]="lastName"/>
            <span class="help-inline"></span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="col-sm-offset-2 col-sm-10">
          <button type="submit" class="btn btn-default">Find Owner</button>
        </div>
      </div>
    </form>

    <div class="owners-table-wrapper">
      <div class="table-responsive" id="ownersTable" [class.is-loading]="loading">
        <table class="table table-striped"
               matSort matSortDisableClear
               [matSortActive]="sortColumn" [matSortDirection]="sortDirection"
               (matSortChange)="onSortChange($event)">
          <thead>
          <tr>
            <th mat-sort-header="name" data-testid="sort-name">Name</th>
            <th mat-sort-header="address" data-testid="sort-address">Address</th>
            <th mat-sort-header="city" data-testid="sort-city">City</th>
            <th>Telephone</th>
            <th>Pets</th>
          </tr>
          </thead>

          <tbody>
          <tr *ngFor="let owner of rows">
            <td class="ownerFullName">
              <a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
                 (click)="onSelect(owner)">{{ owner.firstName }} {{ owner.lastName }}</a>
            </td>
            <td>{{ owner.address }}</td>
            <td>{{ owner.city }}</td>
            <td>{{ owner.telephone }}</td>
            <td>
              <div class="petName" *ngFor="let n of owner.petNames">{{ n }}</div>
            </td>
          </tr>
          </tbody>
        </table>

        <div class="owners-empty" data-testid="owners-empty"
             *ngIf="!loading && totalElements === 0">
          No results
        </div>

        <div class="owners-loading-overlay" data-testid="owners-loading" *ngIf="loading">
          <mat-spinner diameter="48"></mat-spinner>
        </div>
      </div>

      <mat-paginator *ngIf="showPaginator"
                     data-testid="owners-paginator"
                     showFirstLastButtons
                     [pageSizeOptions]="pageSizeOptions"
                     [length]="totalElements"
                     [pageSize]="size"
                     [pageIndex]="page"
                     (page)="onPageChange($event)">
      </mat-paginator>

      <div>
        <button class="btn btn-default" (click)="addOwner()">Add Owner</button>
      </div>
    </div>
  </div>
</div>
