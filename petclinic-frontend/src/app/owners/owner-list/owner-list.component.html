<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <form method="get"
          (submit)="$event.preventDefault()"
          class="form-horizontal" id="search-owner-form">
      <div class="form-group">
        <div class="control-group" id="searchGroup">
          <div class="col-sm-12">
            <input class="form-control" size="30"
                   maxlength="80" id="owners-search" name="q" [(ngModel)]="query"
                   placeholder="Search..." aria-label="Search owners"
                   (ngModelChange)="onSearchTermChange($event)" (blur)="onSearchBlur(query)" value="">
            <span class="help-inline"></span>
          </div>
        </div>
      </div>

    </form>

    <div *ngIf="!owners">No owners matching "{{query}}"</div>
    <div class="table-responsive" id="ownersTable" *ngIf="owners">
      <table class="table table-striped">
        <thead>
        <tr>
          <th>Name</th>
          <th>Address</th>
          <th>City</th>
          <th>Telephone</th>
          <th>Pets</th>
        </tr>
        </thead>
        <tbody>
          <tr *ngFor="let owner of owners">
            <td class="ownerFullName"><a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
                                         (click)="onSelect(owner)">{{ owner.firstName }} {{ owner.lastName }}</a></td>
            <td>{{ owner.address }}</td>
            <td>{{ owner.city }}</td>
            <td>{{ owner.telephone }}</td>
            <td>
              <ng-container *ngFor="let pet of owner.pets; let last = last">
                {{ pet.name }}<br *ngIf="!last">
              </ng-container>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div>
      <button *ngIf="isOwnersDataReceived" class="btn btn-default" (click)="addOwner()">Add Owner</button>
    </div>
  </div>
</div>
