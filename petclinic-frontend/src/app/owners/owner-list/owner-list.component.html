<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

    <div class="form-group">
      <input class="form-control"
             type="text"
             placeholder="Search..."
             [(ngModel)]="searchTerm"
             (ngModelChange)="onSearchInput()"
             (keyup.enter)="onSearchEnter()" />
    </div>

    <div *ngIf="isOwnersDataReceived && owners.length === 0" class="alert alert-info">
      No owners found for "{{ searchTerm }}".
    </div>

    <div class="table-responsive" id="ownersTable" *ngIf="owners.length > 0">
      <table class="table table-striped">
        <thead>
          <tr>
            <th (click)="onSortChange('name')" style="cursor:pointer">
              Name
              <span *ngIf="sortField === 'name'" class="glyphicon"
                    [class.glyphicon-arrow-up]="sortDir === 'asc'"
                    [class.glyphicon-arrow-down]="sortDir === 'desc'">
              </span>
            </th>
            <th>Address</th>
            <th (click)="onSortChange('city')" style="cursor:pointer">
              City
              <span *ngIf="sortField === 'city'" class="glyphicon"
                    [class.glyphicon-arrow-up]="sortDir === 'asc'"
                    [class.glyphicon-arrow-down]="sortDir === 'desc'">
              </span>
            </th>
            <th>Telephone</th>
            <th>Pets</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let owner of owners">
            <td class="ownerFullName">
              <a routerLink="/owners/{{owner.id}}" routerLinkActive="active" (click)="onSelect(owner)">
                {{ owner.firstName }} {{ owner.lastName }}
              </a>
            </td>
            <td>{{ owner.address }}</td>
            <td>{{ owner.city }}</td>
            <td>{{ owner.telephone }}</td>
            <td>
              <span *ngFor="let pet of owner.pets; let last = last">
                {{ pet.name }}<span *ngIf="!last">, </span>
              </span>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Pagination controls -->
      <div class="row">
        <div class="col-sm-4">
          <label>
            Rows per page:
            <select class="form-control input-sm" style="display:inline-block;width:auto"
                    [(ngModel)]="pageSize" (ngModelChange)="onPageSizeChange()">
              <option [value]="5">5</option>
              <option [value]="10">10</option>
              <option [value]="20">20</option>
            </select>
          </label>
        </div>
        <div class="col-sm-4 text-center" style="padding-top:6px">
          Page {{ currentPage + 1 }} of {{ totalPages }} ({{ totalElements }} total)
        </div>
        <div class="col-sm-4 text-right">
          <button class="btn btn-default btn-sm" (click)="prevPage()" [disabled]="currentPage === 0">
            <span class="glyphicon glyphicon-chevron-left"></span> Prev
          </button>
          <button class="btn btn-default btn-sm" (click)="nextPage()"
                  [disabled]="(currentPage + 1) * pageSize >= totalElements">
            Next <span class="glyphicon glyphicon-chevron-right"></span>
          </button>
        </div>
      </div>
    </div>

    <div *ngIf="isOwnersDataReceived">
      <button class="btn btn-default" (click)="addOwner()">Add Owner</button>
    </div>
  </div>
</div>
