<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <form (ngSubmit)="search()" id="search-owner-form" class="owners-search">
      <label for="lastName">Last name </label>
      <input class="form-control" id="lastName" name="lastName" maxlength="80"
             [(ngModel)]="lastName"/>
      <button type="submit" id="search-owner" mat-stroked-button>Find Owner</button>
    </form>

    <mat-progress-bar *ngIf="loading" id="owners-loading" mode="indeterminate"></mat-progress-bar>

    <table mat-table [dataSource]="owners" matSort id="ownersTable"
           [matSortActive]="sortActive" [matSortDirection]="sortDirection"
           matSortDisableClear (matSortChange)="onSortChange($event)"
           class="owners-table mat-elevation-z2">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let owner" class="ownerFullName">
          <a [routerLink]="['/owners', owner.id]">{{ displayName(owner) }}</a>
        </td>
      </ng-container>

      <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef>Address</th>
        <td mat-cell *matCellDef="let owner">{{ owner.address }}</td>
      </ng-container>

      <ng-container matColumnDef="city">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>City</th>
        <td mat-cell *matCellDef="let owner">{{ owner.city }}</td>
      </ng-container>

      <ng-container matColumnDef="telephone">
        <th mat-header-cell *matHeaderCellDef>Telephone</th>
        <td mat-cell *matCellDef="let owner">{{ owner.telephone }}</td>
      </ng-container>

      <ng-container matColumnDef="pets">
        <th mat-header-cell *matHeaderCellDef>Pets</th>
        <td mat-cell *matCellDef="let owner" class="ownerPets">{{ petNames(owner) }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-owners" [attr.colspan]="displayedColumns.length">No owners found</td>
      </tr>
    </table>

    <mat-paginator id="owners-paginator"
                   [length]="totalElements"
                   [pageSize]="pageSize"
                   [pageIndex]="pageIndex"
                   [pageSizeOptions]="pageSizeOptions"
                   (page)="onPageChange($event)"
                   showFirstLastButtons>
    </mat-paginator>

    <div class="owners-actions">
      <button id="add-owner" mat-stroked-button (click)="addOwner()">Add Owner</button>
    </div>
  </div>
</div>
