<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <div class="owner-controls">
      <div class="input-group owner-search-group">
        <input class="form-control"
               type="text"
               placeholder="Search by name, city, address, phone or pet…"
               [(ngModel)]="query"
               (ngModelChange)="onQueryChange()"
               name="query"/>
        <span class="input-group-btn">
          <button class="btn btn-default" type="button" (click)="clearSearch()">Clear</button>
        </span>
      </div>
      <button *ngIf="isOwnersDataReceived" class="btn btn-default" type="button" (click)="addOwner()">Add Owner</button>
    </div>

    <div *ngIf="isOwnersDataReceived && owners?.length === 0">No owners found for "{{query}}"</div>
    <div class="table-responsive" id="ownersTable" *ngIf="owners && owners.length > 0">
      <table class="table table-striped">
        <thead>
        <tr>
          <th class="col-name">
            <button class="btn btn-link" type="button" (click)="toggleSort('name')">
              Name
              <span *ngIf="sort === 'name,asc'">↑</span>
              <span *ngIf="sort === 'name,desc'">↓</span>
            </button>
          </th>
          <th>Address</th>
          <th>
            <button class="btn btn-link" type="button" (click)="toggleSort('city')">
              City
              <span *ngIf="sort === 'city,asc'">↑</span>
              <span *ngIf="sort === 'city,desc'">↓</span>
            </button>
          </th>
          <th>Telephone</th>
          <th>Pets</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let owner of owners">
          <td class="ownerFullName"><a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
                                       (click)="onSelect(owner)">{{ owner.firstName }} {{ owner.lastName }}</a></td>
          <td>{{ owner.address }}</td>
          <td>{{ owner.city }}</td>
          <td>{{ owner.telephone }}</td>
          <td>
            <span *ngFor="let pet of owner.pets; let last = last">{{ pet.name }}<span *ngIf="!last">, </span></span>
          </td>
        </tr>
        </tbody>
      </table>
      <div class="owners-table-toolbar">
        <div class="owners-page-size">
          <label for="ownerPageSize">Rows per page</label>
          <select id="ownerPageSize"
                  [(ngModel)]="size"
                  (ngModelChange)="onSizeChange()"
                  class="form-control input-sm owners-page-size-select">
            <option [value]="10">10</option>
            <option [value]="20">20</option>
          </select>
        </div>
        <div class="pagination owners-pagination">
          <button *ngFor="let p of pageNumbers" type="button" class="btn btn-default"
                  (click)="goToPage(p)" [class.active]="p === page">{{ p + 1 }}</button>
        </div>
      </div>
    </div>
  </div>
</div>
