<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <form method="get"
          class="form-horizontal" id="search-owner-form">
      <div class="form-group">
        <div class="control-group" id="queryGroup">
          <label class="col-sm-2 control-label">Search </label>
          <div class="col-sm-10">
            <input class="form-control" size="30"
                   maxlength="80" id="query" name="query" [(ngModel)]="query"
                   placeholder="Search owners by name, address, city, phone or pet…" value=""/> <span class="help-inline"></span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="col-sm-offset-2 col-sm-10">
          <button type="submit" class="btn btn-default" (click)="search(query)">Search</button>
        </div>
      </div>

    </form>

    <div *ngIf="!owners">No owners match "{{query}}"</div>
    <div class="table-responsive" id="ownersTable"  *ngIf="owners">
      <table class="table table-striped">
        <thead>
        <tr>
          <th class="sortable" id="sortName" (click)="sortBy('name')" style="cursor: pointer;">
            Name
            <span *ngIf="sortField === 'name'"
                  class="glyphicon"
                  [class.glyphicon-chevron-up]="sortDir === 'asc'"
                  [class.glyphicon-chevron-down]="sortDir === 'desc'"></span>
          </th>
          <th>Address</th>
          <th class="sortable" id="sortCity" (click)="sortBy('city')" style="cursor: pointer;">
            City
            <span *ngIf="sortField === 'city'"
                  class="glyphicon"
                  [class.glyphicon-chevron-up]="sortDir === 'asc'"
                  [class.glyphicon-chevron-down]="sortDir === 'desc'"></span>
          </th>
          <th>Telephone</th>
          <th>Pets</th>
        </tr>
        </thead>

        <tbody>
        <tr *ngFor="let owner of owners">
          <td class="ownerFullName"><a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
                                       (click)="onSelect(owner)">{{ owner.firstName }} {{ owner.lastName }}</a></td>
          <td>{{ owner.address }}</td>
          <td>{{ owner.city }}</td>
          <td>{{ owner.telephone }}</td>
          <td>
        <tr *ngFor="let pet of owner.pets">
          {{ pet.name }}
        </tr>
        </td>
        </tr>
        </tbody>
      </table>

      <div class="form-inline" id="pageSizeControl">
        <label for="pageSize">Page size </label>
        <select id="pageSize" class="form-control" name="pageSize"
                [ngModel]="pageSize" (ngModelChange)="changePageSize($event)">
          <option *ngFor="let size of pageSizeOptions" [ngValue]="size">{{ size }}</option>
        </select>
      </div>

      <nav *ngIf="totalPages > 1" id="ownersPagination">
        <ul class="pagination">
          <li [class.disabled]="pageIndex === 0">
            <a href="javascript:void(0)" id="prevPage" (click)="goToPage(pageIndex - 1)">&laquo;</a>
          </li>
          <li *ngFor="let p of pageNumbers" [class.active]="p === pageIndex">
            <a href="javascript:void(0)" class="pageLink" (click)="goToPage(p)">{{ p + 1 }}</a>
          </li>
          <li [class.disabled]="pageIndex === totalPages - 1">
            <a href="javascript:void(0)" id="nextPage" (click)="goToPage(pageIndex + 1)">&raquo;</a>
          </li>
        </ul>
      </nav>

      <div>
        <button *ngIf="isOwnersDataReceived" class="btn btn-default" (click)="addOwner()">Add Owner</button>
      </div>
    </div>
  </div>
</div>
