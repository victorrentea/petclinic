<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <form method="get" class="form-horizontal" id="search-owner-form">
      <div class="form-group">
        <div class="control-group" id="searchGroup">
          <div class="col-sm-12">
            <input
              class="form-control"
              id="search"
              name="search"
              placeholder="Search by name, address, city, telephone, or pet name"
              maxlength="255"
              [(ngModel)]="searchText"
              (input)="onSearchInput(searchText)"
            />
          </div>
        </div>
      </div>
    </form>

    <div class="table-container" style="position: relative;">
      <!-- Loading overlay -->
      <div class="search-overlay" *ngIf="isLoading">
        <div class="spinner-container">
          <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
          </div>
        </div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" *ngIf="!isLoading && currentPage && currentPage.totalElements === 0">
        <div class="empty-state-icon">
          <img src="assets/images/sad-kiro.png" alt="Sad Kiro" width="80" height="80" />
        </div>
        <p class="empty-state-text">No results found</p>
      </div>

      <!-- Owners table -->
      <div class="table-responsive" id="ownersTable" *ngIf="currentPage && currentPage.content.length > 0">
        <table class="table table-striped">
          <thead>
          <tr>
            <th class="sortable" (click)="onSortChange('name')">
              Name
              <span *ngIf="sortColumn === 'name'" class="sort-indicator">{{ sortIndicator }}</span>
            </th>
            <th>Address</th>
            <th class="sortable" (click)="onSortChange('city')">
              City
              <span *ngIf="sortColumn === 'city'" class="sort-indicator">{{ sortIndicator }}</span>
            </th>
            <th>Telephone</th>
            <th>Pets</th>
          </tr>
          </thead>

          <tbody>
          <tr *ngFor="let owner of currentPage.content">
            <td class="ownerFullName">
              <a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
                 (click)="onSelect(owner)">{{ owner.displayName }}</a>
            </td>
            <td>{{ owner.address }}</td>
            <td>{{ owner.city }}</td>
            <td>{{ owner.telephone }}</td>
            <td>
              <span *ngFor="let pet of owner.pets; let last = last">
                {{ pet.name }}<span *ngIf="!last">, </span>
              </span>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination footer -->
    <div class="pagination-footer" *ngIf="currentPage && currentPage.totalElements > 0">
      <div class="pagination-summary">
        Showing {{ showingStart }}&ndash;{{ showingEnd }} of {{ currentPage.totalElements }} owners
      </div>
      <div class="pagination-controls">
        <app-pagination-toolbar
          [currentPage]="currentPage.number + 1"
          [totalPages]="currentPage.totalPages"
          (pageChange)="onPageChange($event)">
        </app-pagination-toolbar>
      </div>
    </div>

    <!-- Page size selector -->
    <div class="page-size-selector" *ngIf="currentPage && currentPage.totalElements > 0">
      <label for="pageSize">Rows per page:</label>
      <select id="pageSize" [ngModel]="paginationState.size" (ngModelChange)="onPageSizeChange($event)">
        <option [ngValue]="10">10</option>
        <option [ngValue]="25">25</option>
        <option [ngValue]="50">50</option>
      </select>
    </div>

    <div>
      <button class="btn btn-default" (click)="addOwner()">Add Owner</button>
    </div>
  </div>
</div>
