<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <form method="get"
          class="form-horizontal" id="search-owner-form">
      <div class="form-group">
        <div class="control-group" id="lastNameGroup">
          <label class="col-sm-2 control-label">Last name </label>
          <div class="col-sm-10">
            <input class="form-control" size="30"
                   maxlength="80" id="lastName" name="lastName" [(ngModel)]="lastName" value=""/> <span class="help-inline"></span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="col-sm-offset-2 col-sm-10">
          <button type="button" class="btn btn-default" (click)="searchByLastName(lastName)">Find
            Owner</button>
        </div>
      </div>

    </form>

    <div *ngIf="isOwnersDataReceived && owners.length === 0">No owners with LastName starting with "{{lastName}}"</div>
    <div class="table-responsive" id="ownersTable"  *ngIf="owners.length > 0">
      <table class="table table-striped">
        <thead>
        <tr>
          <th><button type="button" class="btn btn-link" (click)="onSort('name')">Name<span *ngIf="isSortedBy('name')"> {{ sortIndicator('name') }}</span></button></th>
          <th><button type="button" class="btn btn-link" (click)="onSort('address')">Address<span *ngIf="isSortedBy('address')"> {{ sortIndicator('address') }}</span></button></th>
          <th><button type="button" class="btn btn-link" (click)="onSort('city')">City<span *ngIf="isSortedBy('city')"> {{ sortIndicator('city') }}</span></button></th>
          <th><button type="button" class="btn btn-link" (click)="onSort('telephone')">Telephone<span *ngIf="isSortedBy('telephone')"> {{ sortIndicator('telephone') }}</span></button></th>
          <th>Pets</th>
        </tr>
        </thead>

        <tbody>
        <tr *ngFor="let owner of owners">
          <td class="ownerFullName"><a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
                                       (click)="onSelect(owner)">{{ owner.lastName }} {{ owner.firstName }}</a></td>
          <td>{{ owner.address }}</td>
          <td>{{ owner.city }}</td>
          <td>{{ owner.telephone }}</td>
          <td>
        <tr *ngFor="let pet of owner.pets">
          {{ pet.name }}
        </tr>
        </td>
        </tr>
        </tbody>
      </table>
      <div class="owners-controls">
        <button *ngIf="isOwnersDataReceived" class="btn btn-default" (click)="addOwner()">Add Owner</button>
        <div class="owners-footer-right">
          <div class="owners-pagination">
            <button type="button" class="btn btn-default" (click)="onPreviousPage()" [disabled]="pageIndex === 0">Previous</button>
            <span>Page {{ pageIndex + 1 }} / {{ totalPages || 1 }}</span>
            <button type="button" class="btn btn-default" (click)="onNextPage()" [disabled]="pageIndex >= totalPages - 1">Next</button>
          </div>
          <div class="owners-page-size">
            <label for="pageSize">Rows per page</label>
            <select id="pageSize" class="form-control" [ngModel]="pageSize" (ngModelChange)="onPageSizeChange($event)" name="pageSize">
              <option [ngValue]="5">5</option>
              <option [ngValue]="10">10</option>
              <option [ngValue]="20">20</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
