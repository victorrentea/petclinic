<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <div class="input-group" style="max-width: 500px; margin-bottom: 16px;">
      <input class="form-control"
             type="text"
             placeholder="Search by name, city, address, phone or pet…"
             [(ngModel)]="query"
             (ngModelChange)="onQueryChange($event)"
             name="query"/>
      <span class="input-group-btn">
        <button class="btn btn-default" type="button" (click)="clearSearch()">Clear</button>
      </span>
    </div>

    <div *ngIf="isOwnersDataReceived && owners?.length === 0">No owners found for "{{query}}"</div>
    <div class="table-responsive" id="ownersTable" *ngIf="owners && owners.length > 0">
      <table class="table table-striped">
        <thead>
        <tr>
          <th>Name</th>
          <th>Address</th>
          <th>City</th>
          <th>Telephone</th>
          <th>Pets</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let owner of owners">
          <td class="ownerFullName"><a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
                                       (click)="onSelect(owner)">{{ owner.firstName }} {{ owner.lastName }}</a></td>
          <td>{{ owner.address }}</td>
          <td>{{ owner.city }}</td>
          <td>{{ owner.telephone }}</td>
          <td>
            <span *ngFor="let pet of owner.pets; let last = last">{{ pet.name }}<span *ngIf="!last">, </span></span>
          </td>
        </tr>
        </tbody>
      </table>
      <div>
        <button *ngIf="isOwnersDataReceived" class="btn btn-default" (click)="addOwner()">Add Owner</button>
      </div>
    </div>
    <div *ngIf="isOwnersDataReceived && (!owners || owners.length === 0) && !query">
      <button class="btn btn-default" (click)="addOwner()">Add Owner</button>
    </div>
  </div>
</div>
