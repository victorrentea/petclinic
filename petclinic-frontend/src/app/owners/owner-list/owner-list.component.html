<div class="container-fluid">
  <div class="container xd-container">
    <div class="owners-header">
      <h2>Owners</h2>
      <button *ngIf="isOwnersDataReceived" class="btn btn-default" (click)="addOwner()">Add Owner</button>
    </div>

    <form method="get"
          (submit)="$event.preventDefault()"
          class="form-horizontal" id="search-owner-form">
      <div class="form-group">
        <div class="control-group" id="searchGroup">
          <div class="col-sm-12">
            <input class="form-control" size="30"
                   maxlength="80" id="owners-search" name="q" [(ngModel)]="query"
                   placeholder="Search..." aria-label="Search owners"
                   (ngModelChange)="onSearchTermChange($event)" (blur)="onSearchBlur(query)" value="">
            <span class="help-inline"></span>
          </div>
        </div>
      </div>

    </form>

    <div *ngIf="isOwnersDataReceived && owners.length === 0">No owners matching "{{query}}"</div>
    <div class="table-responsive" id="ownersTable" *ngIf="owners.length > 0">
      <table class="table table-striped">
        <thead>
        <tr>
          <th>Name</th>
          <th>Address</th>
          <th>City</th>
          <th>Telephone</th>
          <th>Pets</th>
        </tr>
        </thead>
        <tbody>
          <tr *ngFor="let owner of owners">
            <td class="ownerFullName"><a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
                                         (click)="onSelect(owner)">{{ owner.firstName }} {{ owner.lastName }}</a></td>
            <td>{{ owner.address }}</td>
            <td>{{ owner.city }}</td>
            <td>{{ owner.telephone }}</td>
            <td>
              <ng-container *ngFor="let pet of owner.pets; let last = last">
                {{ pet.name }}<br *ngIf="!last">
              </ng-container>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="owners-footer" *ngIf="isOwnersDataReceived">
      <nav aria-label="Owners pages" *ngIf="totalPages > 1">
        <ul class="pagination owners-pagination">
          <li [class.disabled]="page === 0">
            <a href="#" (click)="$event.preventDefault(); previousPage()" aria-label="Previous page">&laquo;</a>
          </li>
          <li
            *ngFor="let item of pageLinks"
            [class.active]="item === page"
            [class.disabled]="item === 'ellipsis'"
          >
            <span *ngIf="item === 'ellipsis'">&hellip;</span>
            <a
              *ngIf="item !== 'ellipsis'"
              href="#"
              (click)="$event.preventDefault(); onPageLinkClick(item)"
            >{{ item + 1 }}</a>
          </li>
          <li [class.disabled]="page >= totalPages - 1">
            <a href="#" (click)="$event.preventDefault(); nextPage()" aria-label="Next page">&raquo;</a>
          </li>
        </ul>
      </nav>

      <div class="owners-controls">
        <div class="owners-page-size">
          <label for="owners-page-size">Rows:</label>
          <select
            id="owners-page-size"
            class="form-control"
            [ngModel]="size"
            (ngModelChange)="onPageSizeChange($event)"
            [ngModelOptions]="{ standalone: true }"
          >
            <option *ngFor="let option of pageSizeOptions" [ngValue]="option">{{ option }}</option>
          </select>
        </div>
        <div class="owners-pages-total" *ngIf="totalPages > 0">
          Page {{ page + 1 }} of {{ totalPages }}
        </div>
      </div>
    </div>
  </div>
</div>
