<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <form method="get" class="form-horizontal" id="search-owner-form">
      <div class="form-group">
        <div class="control-group" id="searchGroup">
          <div class="col-sm-12">
            <input 
              class="form-control" 
              id="search" 
              name="search" 
              placeholder="Search by name, address, city, telephone, or pet name"
              maxlength="255"
              [(ngModel)]="searchText"
              (input)="onSearchInput(searchText)"
            />
          </div>
        </div>
      </div>
    </form>

    <div class="table-container" style="position: relative;">
      <!-- Loading overlay -->
      <div class="search-overlay" *ngIf="isLoading">
        <div class="spinner-container">
          <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
          </div>
        </div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" *ngIf="!isLoading && owners?.length === 0">
        <div class="empty-state-icon">
          <img src="assets/images/sad-kiro.png" alt="Sad Kiro" width="80" height="80" />
        </div>
        <p class="empty-state-text">No results found</p>
      </div>

      <!-- Owners table -->
      <div class="table-responsive" id="ownersTable" *ngIf="owners && owners.length > 0">
        <table class="table table-striped">
          <thead>
          <tr>
            <th>Name</th>
            <th>Address</th>
            <th>City</th>
            <th>Telephone</th>
            <th>Pets</th>
          </tr>
          </thead>

          <tbody>
          <tr *ngFor="let owner of owners">
            <td class="ownerFullName"><a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
                                         (click)="onSelect(owner)">{{ owner.firstName }} {{ owner.lastName }}</a></td>
            <td>{{ owner.address }}</td>
            <td>{{ owner.city }}</td>
            <td>{{ owner.telephone }}</td>
            <td>
          <tr *ngFor="let pet of owner.pets">
            {{ pet.name }}
          </tr>
          </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div>
      <button *ngIf="isOwnersDataReceived" class="btn btn-default" (click)="addOwner()">Add Owner</button>
    </div>
  </div>
</div>
