<div class="container-fluid">
  <div class="container xd-container">
    <h2>Owners</h2>

    <form method="get"
          class="form-horizontal" id="search-owner-form" (ngSubmit)="search(lastName)">
      <div class="form-group">
        <div class="control-group" id="lastNameGroup">
          <label class="col-sm-2 control-label">Last name </label>
          <div class="col-sm-10">
            <input class="form-control" size="30"
                   maxlength="80" id="lastName" name="lastName" [(ngModel)]="lastName" value=""/> <span class="help-inline"></span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="col-sm-offset-2 col-sm-10">
          <button type="submit" class="btn btn-default" (click)="search(lastName)">Find
            Owner</button>
        </div>
      </div>

    </form>

    <div *ngIf="isOwnersDataReceived && totalElements === 0" id="noOwnersFound">No owners found</div>

    <div class="table-responsive" id="ownersTable" *ngIf="totalElements > 0">
      <table class="table table-striped">
        <thead>
        <tr>
          <th id="sort-name" class="sortable" (click)="toggleSort('name')">
            Name
            <span class="sort-indicator" [class.active]="isSorted('name')">{{ sortIndicator('name') }}</span>
          </th>
          <th>Address</th>
          <th id="sort-city" class="sortable" (click)="toggleSort('city')">
            City
            <span class="sort-indicator" [class.active]="isSorted('city')">{{ sortIndicator('city') }}</span>
          </th>
          <th>Telephone</th>
          <th>Pets</th>
        </tr>
        </thead>

        <tbody>
        <tr *ngFor="let owner of owners">
          <td class="ownerFullName"><a routerLink="/owners/{{owner.id}}" routerLinkActive="active"
                                       (click)="onSelect(owner)">{{ owner.lastName }} {{ owner.firstName }}</a></td>
          <td>{{ owner.address }}</td>
          <td>{{ owner.city }}</td>
          <td>{{ owner.telephone }}</td>
          <td>
            <div *ngFor="let pet of owner.pets" class="petName">{{ pet.name }}</div>
          </td>
        </tr>
        </tbody>
      </table>

      <mat-paginator id="ownersPaginator"
                     [length]="totalElements"
                     [pageSize]="size"
                     [pageIndex]="page"
                     [pageSizeOptions]="pageSizeOptions"
                     showFirstLastButtons
                     (page)="onPage($event)">
      </mat-paginator>
    </div>

    <div>
      <button *ngIf="isOwnersDataReceived" class="btn btn-default" (click)="addOwner()">Add Owner</button>
    </div>
  </div>
</div>
