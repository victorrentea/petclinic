<nav class="pagination-toolbar" *ngIf="totalPages > 0" aria-label="Page navigation">
  <ul class="pagination">
    <li *ngFor="let slot of slots"
        [class.active]="slot.isCurrent">
      <button type="button"
              class="btn btn-default"
              [class.btn-primary]="slot.isCurrent"
              [disabled]="slot.isCurrent"
              (click)="onSlotClick(slot)"
              [attr.aria-current]="slot.isCurrent ? 'page' : null"
              [attr.aria-label]="'Page ' + slot.page">
        {{ slot.label }}
      </button>
    </li>
  </ul>
</nav>
