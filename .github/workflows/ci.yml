name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On pull_request events, head_ref is the PR's source branch.
          # On push events, ref_name is the pushed branch (main).
          ref: ${{ github.head_ref || github.ref_name }}
          # fetch-depth: 0 lets us push regenerated artifacts back without
          # rejection and gives SonarCloud accurate SCM blame info.
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # ── Backend (NestJS + TypeORM) ──────────────────────────────────────
      - name: Install backend dependencies
        working-directory: petclinic-backend-ts
        run: npm ci

      - name: Build backend (nest build)
        working-directory: petclinic-backend-ts
        run: npm run build

      - name: Run backend unit tests
        working-directory: petclinic-backend-ts
        run: npm test

      # ── Frontend (Angular) ──────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: petclinic-frontend
        run: npm ci

      - name: Regenerate TS types from openapi.yaml
        working-directory: petclinic-frontend
        run: npm run generate:api --silent

      - name: Run frontend tests (Karma + ChromeHeadlessCI)
        working-directory: petclinic-frontend
        run: npm run test-headless -- --code-coverage

      - name: Strict frontend build (fails on any webpack warning)
        working-directory: petclinic-frontend
        run: npm run build

      # ── Drift detection: regenerated api-types.ts must match HEAD ────────
      - name: Detect drift in regenerated artifacts
        id: drift
        run: |
          if git diff --quiet petclinic-frontend/src/app/generated/api-types.ts; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true"  >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat petclinic-frontend/src/app/generated/api-types.ts
          fi

      - name: Fail fork PRs that have drift
        if: steps.drift.outputs.drift == 'true' && github.event.pull_request.head.repo.fork == true
        run: |
          echo "::error::api-types.ts is out of date."
          echo "::error::Run 'cd petclinic-frontend && npm run generate:api' locally and push the regenerated file."
          exit 1

      - name: Auto-commit regenerated artifacts
        if: steps.drift.outputs.drift == 'true' && github.event.pull_request.head.repo.fork != true
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add petclinic-frontend/src/app/generated/api-types.ts
          git commit -m 'chore(guardrail): regenerate api-types.ts [skip ci]'
          git push

      # ── SonarCloud ──────────────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
