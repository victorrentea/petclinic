name: Nightly C4 Diagram

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC every night
  workflow_dispatch:      # allow manual trigger

jobs:
  generate-c4:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile and extract C4 model
        working-directory: petclinic-backend
        run: ./mvnw compile test -Dtest=C4ModelExtractor -q

      - name: Commit updated diagram
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/c3-components-backend.puml
          git diff --cached --quiet || git commit -m "chore: regenerate C4 component diagram [skip ci]"
          git push
