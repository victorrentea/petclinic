version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/petclinic-backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "backend"
    reviewers:
      - "victorrentea"
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "maven"
    directory: "/petclinic-database"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "database"
    reviewers:
      - "victorrentea"
    open-pull-requests-limit: 5
    groups:
      database-minor-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/petclinic-frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "frontend"
    reviewers:
      - "victorrentea"
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "ci"
    reviewers:
      - "victorrentea"
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
