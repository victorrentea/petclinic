components:
  schemas:
    OwnerDto:
      type: object
      properties:
        address:
          type: string
          description: The postal address of the pet owner.
          example: 110 W. Liberty St.
          maxLength: 255
          minLength: 1
        city:
          type: string
          description: The city of the pet owner.
          example: Madison
          maxLength: 80
          minLength: 1
        firstName:
          type: string
          description: The first name of the pet owner.
          example: George
          maxLength: 30
          minLength: 1
        id:
          type: integer
          format: int32
          description: The ID of the pet owner.
          example: 1
          minimum: 0
          readOnly: true
        lastName:
          type: string
          description: The last name of the pet owner.
          example: Franklin
          maxLength: 30
          minLength: 1
        pets:
          type: array
          description: The pets owned by this individual including any booked vet
            visits.
          items:
            $ref: "#/components/schemas/PetDto"
          readOnly: true
        telephone:
          type: string
          description: The telephone number of the pet owner.
          example: "6085551023"
          maxLength: 20
          minLength: 1
          pattern: "^[0-9]*$"
      required:
      - address
      - city
      - firstName
      - lastName
      - pets
      - telephone
    OwnerFieldsDto:
      type: object
      properties:
        address:
          type: string
          description: The postal address of the pet owner.
          example: 110 W. Liberty St.
          maxLength: 255
          minLength: 1
        city:
          type: string
          description: The city of the pet owner.
          example: Madison
          maxLength: 80
          minLength: 1
        firstName:
          type: string
          description: The first name of the pet owner.
          example: George
          maxLength: 30
          minLength: 1
        lastName:
          type: string
          description: The last name of the pet owner.
          example: Franklin
          maxLength: 30
          minLength: 1
        telephone:
          type: string
          description: The telephone number of the pet owner.
          example: "6085551023"
          maxLength: 20
          minLength: 1
          pattern: "^[0-9]*$"
      required:
      - address
      - city
      - firstName
      - lastName
      - telephone
    PageOwnerDto:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/OwnerDto"
        empty:
          type: boolean
        first:
          type: boolean
        last:
          type: boolean
        number:
          type: integer
          format: int32
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        size:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
    Pageable:
      type: object
      properties:
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        sort:
          type: array
          items:
            type: string
    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        paged:
          type: boolean
        sort:
          $ref: "#/components/schemas/SortObject"
        unpaged:
          type: boolean
    PetDto:
      type: object
      properties:
        birthDate:
          type: string
          format: date
          example: 2010-09-07
        id:
          type: integer
          format: int32
          description: The ID of the pet.
          example: 1
          minimum: 0
          readOnly: true
        name:
          type: string
          description: The name of the pet.
          example: Leo
          maxLength: 30
          minLength: 0
        ownerId:
          type: integer
          format: int32
          description: The ID of the pet's owner.
          example: 1
          minimum: 0
          readOnly: true
        type:
          $ref: "#/components/schemas/PetTypeDto"
        visits:
          type: array
          description: Vet visit bookings for this pet.
          items:
            $ref: "#/components/schemas/VisitDto"
          readOnly: true
      required:
      - birthDate
      - id
      - name
      - type
      - visits
    PetFieldsDto:
      type: object
      properties:
        birthDate:
          type: string
          format: date
          description: The date of birth of the pet.
          example: 2010-09-07
        name:
          type: string
          description: The name of the pet.
          example: Leo
          maxLength: 30
          minLength: 0
        type:
          $ref: "#/components/schemas/PetTypeDto"
      required:
      - birthDate
      - name
      - type
    PetTypeDto:
      type: object
      properties:
        id:
          type: integer
          format: int32
          description: The ID of the pet type.
          example: 1
          minimum: 0
        name:
          type: string
          description: The name of the pet type.
          example: cat
          maxLength: 80
          minLength: 1
      required:
      - id
      - name
    PetTypeFieldsDto:
      type: object
      properties:
        name:
          type: string
          description: The name of the pet type.
          example: cat
          maxLength: 80
          minLength: 1
      required:
      - name
    ProblemDetail:
      type: object
      properties:
        detail:
          type: string
        instance:
          type: string
          format: uri
        properties:
          type: object
          additionalProperties: {}
        status:
          type: integer
          format: int32
        title:
          type: string
        type:
          type: string
          format: uri
    RoleDto:
      type: object
      properties:
        name:
          type: string
          description: The role's name
          example: admin
          maxLength: 80
          minLength: 1
      required:
      - name
    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        sorted:
          type: boolean
        unsorted:
          type: boolean
    SpecialtyDto:
      type: object
      properties:
        id:
          type: integer
          format: int32
          description: The ID of the specialty.
          example: 1
          minimum: 0
          readOnly: true
        name:
          type: string
          description: The name of the specialty.
          example: radiology
          maxLength: 80
          minLength: 1
      required:
      - id
      - name
    UserDto:
      type: object
      properties:
        enabled:
          type: boolean
          description: Indicates if the user is enabled
          example: true
        password:
          type: string
          description: The password
          example: 1234abc
          maxLength: 80
          minLength: 1
        roles:
          type: array
          description: The roles of an user
          items:
            $ref: "#/components/schemas/RoleDto"
        username:
          type: string
          description: The username
          example: john.doe
          maxLength: 80
          minLength: 1
      required:
      - username
    VetDto:
      type: object
      properties:
        firstName:
          type: string
          description: The first name of the vet.
          example: James
          maxLength: 30
          minLength: 1
          pattern: \w+
        id:
          type: integer
          format: int32
          description: The ID of the vet.
          example: 1
          minimum: 0
          readOnly: true
        lastName:
          type: string
          description: The last name of the vet.
          example: Carter
          maxLength: 30
          minLength: 1
          pattern: \w+
        specialties:
          type: array
          description: The specialties of the vet.
          items:
            $ref: "#/components/schemas/SpecialtyDto"
      required:
      - firstName
      - id
      - lastName
      - specialties
    VisitDto:
      type: object
      properties:
        date:
          type: string
          format: date
          description: The date of the visit.
          example: 2013-01-01
        description:
          type: string
          description: The description for the visit.
          example: rabies shot
          maxLength: 255
          minLength: 1
        id:
          type: integer
          format: int32
          description: The ID of the visit.
          example: 1
          minimum: 0
          readOnly: true
        ownerFirstName:
          type: string
          description: First name of the owner (server-populated).
          readOnly: true
        ownerId:
          type: integer
          format: int32
          description: ID of the owner of the pet (server-populated).
          readOnly: true
        ownerLastName:
          type: string
          description: Last name of the owner (server-populated).
          readOnly: true
        petId:
          type: integer
          format: int32
          description: The ID of the pet.
          example: 1
          minimum: 0
        petName:
          type: string
          description: Name of the pet (server-populated).
          readOnly: true
      required:
      - description
      - id
      - petId
    VisitFieldsDto:
      type: object
      properties:
        date:
          type: string
          format: date
          description: The date of the visit.
          example: 2013-01-01
        description:
          type: string
          description: The description for the visit.
          example: rabies shot
          maxLength: 255
          minLength: 1
      required:
      - description
