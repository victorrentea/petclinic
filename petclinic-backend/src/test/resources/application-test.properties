
#spring.sql.init.mode=never

# Schema-validate guardrail: any @SpringBootTest annotated with @ActiveProfiles("test")
# fails fast on entity ↔ migration drift (see JpaSchemaValidateTest).
spring.jpa.hibernate.ddl-auto=validate

# Deterministic openapi.yaml output (sort keys alphabetically) so the
# OpenApiExtractor produces stable diffs across runs.
springdoc.writer-with-order-by-keys=true
