spring.datasource.url=jdbc:postgresql://localhost:5432/petclinic
spring.datasource.username=petclinic
spring.datasource.password=petclinic

# Hibernate: Flyway owns the schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
# Batch-load lazy collections to avoid N+1 when the mapper touches owner.pets
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# OpenAPI/Swagger UI
openapi.info.title=REST Petclinic Backend API
openapi.info.version=1.0
openapi.info.terms-of-service=https://github.com/spring-petclinic/petclinic-rest/blob/master/terms.txt
openapi.info.description=This is the REST API documentation of the Spring Petclinic backend. If authentication is enabled, use admin/admin when calling the APIs

logging.level.org.springframework=INFO

# Authentication off by default
petclinic.security.enable=false

# MCP server (Spring AI) — Streamable HTTP transport (spec 2025-06-18) on the single endpoint /mcp.
# Replaces the deprecated HTTP+SSE transport; POST+GET on one endpoint, session via Mcp-Session-Id.
spring.ai.mcp.server.name=petclinic-mcp
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp
# Server->client request timeout (also governs how long an elicitation waits for the HUMAN to answer).
# Default is 20s — too short to "read the prompt, type a street address, click Approve", so
# call_vet_ambulance would time out and the late human answer arrived as an orphaned
# "Unexpected response for unknown id".
spring.ai.mcp.server.request-timeout=120s
# Trusted-chatbot SERVICE key: every /mcp request must carry it as X-API-Key (custom + Claude chatbots).
# The per-USER identity is separate — the sub of the Bearer JWT on each tool call. NOT a real secret.
petclinic.mcp.api-key=pc-mcp-7f3a9c2e1b8d4056

# Immediate shutdown — long-lived SSE streams otherwise stall the graceful path.
server.shutdown=immediate

